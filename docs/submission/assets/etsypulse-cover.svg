<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">EtsyPulse cover image</title>
  <desc id="desc">A bold market intelligence command center for Etsy sellers, showing agent signals becoming actionable briefs.</desc>
  <defs>
