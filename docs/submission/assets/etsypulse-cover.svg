      <stop offset="0.46" stop-color="#f2d7a8"/>
      <stop offset="1" stop-color="#12312c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="1" stop-color="#f0c778"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2e2b"/>
      <stop offset="1" stop-color="#1b534b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0d261f" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#f2d7a8"/>
  <path d="M96 690 C300 606 438 760 640 672 C768 616 826 648 910 704" fill="none" stroke="#fff8ec" stroke-width="2" opacity="0.22"/>
  <path d="M88 732 C322 646 448 812 664 714 C786 658 842 700 942 748" fill="none" stroke="#12312c" stroke-width="2" opacity="0.12"/>
  <circle cx="1320" cy="142" r="270" fill="#ff884d" opacity="0.16"/>
  <circle cx="110" cy="840" r="360" fill="#fff7df" opacity="0.25"/>

