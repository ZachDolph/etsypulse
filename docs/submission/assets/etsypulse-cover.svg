      <text x="28" y="82" font-family="Verdana, sans-serif" font-size="17" fill="#35544b">Test a gift-ready linen bundle this week.</text>
      <rect x="28" y="108" width="142" height="30" rx="15" fill="#12312c"/>
      <text x="48" y="130" font-family="Verdana, sans-serif" font-size="15" fill="#fff6df">Judge 82%</text>
      <rect x="188" y="108" width="182" height="30" rx="15" fill="#f0c778"/>
      <text x="210" y="130" font-family="Verdana, sans-serif" font-size="15" fill="#12312c">actionable now</text>
