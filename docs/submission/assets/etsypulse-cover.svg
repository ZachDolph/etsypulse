    <text x="0" y="86" font-family="Georgia, 'Times New Roman', serif" font-size="94" line-height="1" font-weight="700" fill="#102b27">Market signals,</text>
    <text x="0" y="184" font-family="Georgia, 'Times New Roman', serif" font-size="94" line-height="1" font-weight="700" fill="#102b27">not market noise.</text>
    <text x="4" y="252" font-family="Verdana, sans-serif" font-size="28" fill="#285048">Autonomous agents monitor Etsy, SERP, competitors, and social trends.</text>
    <text x="4" y="294" font-family="Verdana, sans-serif" font-size="28" fill="#285048">A Judge Agent only delivers briefs sellers can act on now.</text>
  </g>

  <g transform="translate(920 146)" filter="url(#shadow)">
