    <rect x="34" y="36" width="468" height="88" rx="24" fill="#1f4b43"/>
    <circle cx="76" cy="80" r="16" fill="#f5b454"/>
    <circle cx="124" cy="80" r="16" fill="#8fd4b0"/>
    <circle cx="172" cy="80" r="16" fill="#e46f46"/>
    <text x="222" y="90" font-family="Verdana, sans-serif" font-size="22" fill="#fff6df">Agent activity live</text>

