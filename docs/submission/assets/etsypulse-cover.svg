      <text x="26" y="34" font-family="Verdana, sans-serif" font-size="18" font-weight="700" fill="#fff6df">Market Pulse</text>
      <text x="26" y="61" font-family="Verdana, sans-serif" font-size="16" fill="#cbe6d5">Keywords + competitors + social trends</text>
    </g>
