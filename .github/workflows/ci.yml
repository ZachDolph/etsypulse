name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Compile backend
        run: PYTHONPATH=backend python -m py_compile backend/app/*.py backend/app/agents/*.py backend/app/services/*.py backend/app/demo_data/*.py backend/scripts/*.py
      - name: Validate fixtures
        run: PYTHONPATH=backend python backend/scripts/validate_brightdata_fixtures.py
      - name: Validate demo deployment env
        run: PYTHONPATH=backend python backend/scripts/validate_deployment_env.py
      - name: Test backend
        run: PYTHONPATH=backend python -m pytest backend/tests -q
      - name: Build backend Docker image
        run: docker build -t etsypulse-api:ci backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
